<section class="panel stats-panel">
  <h2>Stats</h2>
  <div class="stats-grid">
    <div><strong>Coffee</strong></div><div>{{ engine.state().coffee | number:'1.0-0' }}</div>
    <div><strong>Total Coffee</strong></div><div>{{ engine.state().totalCoffee | number:'1.0-0' }}</div>
    <div><strong>CPS</strong></div><div>{{ engine.state().cps | number:'1.0-0' }}</div>
    <div><strong>Charisma</strong></div><div>{{ engine.state().charisma }}</div>
    <div><strong>Coffee Strength</strong></div><div>{{ engine.state().coffeeStrength }}</div>
    <div><strong>Current Act</strong></div><div>{{ currentAct }}</div>
  </div>
</section>
